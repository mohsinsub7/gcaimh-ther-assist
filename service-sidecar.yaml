apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ther-assist-sidecar
  annotations:
    run.googleapis.com/launch-stage: BETA
spec:
  template:
    metadata:
      annotations:
        # Total resource limits shared across all containers (max 8 vCPU / 32 GiB)
        run.googleapis.com/execution-environment: gen2
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/network-interfaces: '[{"network":"projects/brk-prj-net-shared/global/networks/brk-sandboxes-shared-vpc","subnetwork":"projects/brk-prj-net-shared/regions/us-central1/subnetworks/brk-sandboxes-sbn-serverless-usc1"}]'
        run.googleapis.com/vpc-access-egress: all-traffic
    spec:
      serviceAccountName: 420536872556-compute@developer.gserviceaccount.com
      containerConcurrency: 40
      timeoutSeconds: 3600
      containers:
        # ── Ingress container: Frontend (nginx) ──
        - image: us-central1-docker.pkg.dev/brk-prj-salvador-dura-bern-sbx/therapy-images/ther-assist-frontend:sidecar
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: 128Mi
              cpu: "0.5"

        # ── Sidecar: Therapy Analysis ──
        - image: us-central1-docker.pkg.dev/brk-prj-salvador-dura-bern-sbx/therapy-images/therapy-analysis:sidecar
          env:
            - name: PORT
              value: "8081"
            - name: GOOGLE_CLOUD_PROJECT
              value: brk-prj-salvador-dura-bern-sbx
            - name: GOOGLE_CLOUD_LOCATION
              value: us-central1
          resources:
            limits:
              memory: 16Gi
              cpu: "4"
          startupProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12

        # ── Sidecar: Storage Access ──
        - image: us-central1-docker.pkg.dev/brk-prj-salvador-dura-bern-sbx/therapy-images/storage-access:sidecar
          env:
            - name: PORT
              value: "8082"
            - name: GOOGLE_CLOUD_PROJECT
              value: brk-prj-salvador-dura-bern-sbx
          resources:
            limits:
              memory: 128Mi
              cpu: "0.5"

        # ── Sidecar: Streaming Transcription ──
        - image: us-central1-docker.pkg.dev/brk-prj-salvador-dura-bern-sbx/therapy-images/therapy-streaming-transcription:sidecar
          env:
            - name: PORT
              value: "8083"
            - name: GOOGLE_CLOUD_PROJECT
              value: brk-prj-salvador-dura-bern-sbx
            - name: GOOGLE_CLOUD_LOCATION
              value: us-central1
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            limits:
              memory: 2Gi
              cpu: "2"
          startupProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
